<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주식 프리즘 — 같은 데이터, 세 가지 시선</title>
</head>
<body style="margin:0; padding:0; background:#ffffff; font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif; color:#1f2937; line-height:1.7;">

<div style="max-width:800px; margin:0 auto; padding:24px 16px;">

  <!-- ═══════════ 사이트 공통: 상단 브랜드 바 (상세 페이지와 동일 높이) ═══════════ -->
  <nav style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #e5e7eb; padding-bottom:12px; margin-bottom:20px;">
    <span style="font-size:13px; letter-spacing:1px; color:#6b7280; font-weight:700;">📈 STOCK PRISM</span>
  </nav>

  <!-- ═══════════ 헤더 ═══════════ -->
  <header style="border-bottom:2px solid #111827; padding-bottom:20px; margin-bottom:24px;">
    <h1 style="margin:0 0 10px 0; font-size:30px; line-height:1.4;">주식 프리즘</h1>
    <p style="margin:0; font-size:15px; color:#374151;">한 종목을 재무·뉴스·업종 세 갈래로 분석하고, 공격적·중립적·보수적 세 관점의 필진이 각자 결론을 내립니다. 같은 데이터, 세 가지 시선.</p>
  </header>

  <!-- ═══════════ 포스트 목록 ═══════════ -->
  <div id="post-list">
    <p id="loading-msg" style="font-size:14px; color:#6b7280; text-align:center; padding:40px 0;">포스트 목록을 불러오는 중입니다…</p>
  </div>

  <!-- ═══════════ 면책고지 ═══════════ -->
  <footer style="margin-top:40px; border-top:1px solid #e5e7eb; padding-top:20px;">
    <p style="font-size:12px; color:#9ca3af; margin:0;">본 블로그의 모든 글은 정보 제공을 목적으로 하며, 특정 종목의 매수·매도를 권유하는 것이 아닙니다. 투자의 최종 판단과 책임은 투자자 본인에게 있습니다.</p>
      <div style="margin-top:10px; font-size:12px; color:#6b7280;"><span style="font-weight:700; letter-spacing:1px;">📈 STOCK PRISM</span> · 같은 데이터, 세 가지 시선</div>
  </footer>

</div>

<script>
(function () {
  var API_URL = 'https://api.github.com/repos/seil77/stock-prism/contents/posts';
  var PERSPECTIVES = {
    '공격적': { color: '#dc2626', desc: '성장 가능성에 무게' },
    '중립적': { color: '#4b5563', desc: '양쪽 근거를 저울에' },
    '보수적': { color: '#2563eb', desc: '리스크 관리 우선' }
  };
  var ORDER = ['공격적', '중립적', '보수적'];

  function fmtDate(yyyymmdd) {
    return yyyymmdd.slice(0, 4) + '-' + yyyymmdd.slice(4, 6) + '-' + yyyymmdd.slice(6, 8);
  }

  function render(files) {
    // 파일명 규칙: YYYYMMDD_종목명_관점.html
    var groups = {}; // key: date_stock
    files.forEach(function (f) {
      var m = /^(\d{8})_(.+)_(공격적|중립적|보수적)\.html$/.exec(f.name);
      if (!m) return;
      var key = m[1] + '_' + m[2];
      if (!groups[key]) groups[key] = { date: m[1], stock: m[2], views: {} };
      groups[key].views[m[3]] = 'posts/' + encodeURIComponent(f.name);
    });

    var keys = Object.keys(groups).sort().reverse(); // 최신 날짜 먼저
    var container = document.getElementById('post-list');

    if (keys.length === 0) {
      container.innerHTML = '<p style="font-size:14px; color:#6b7280; text-align:center; padding:40px 0;">아직 게시된 포스트가 없습니다.</p>';
      return;
    }

    var html = '';
    var lastDate = '';
    keys.forEach(function (key) {
      var g = groups[key];
      if (g.date !== lastDate) {
        lastDate = g.date;
        html += '<h2 style="font-size:15px; color:#6b7280; font-weight:700; letter-spacing:0.5px; margin:28px 0 12px 0;">' + fmtDate(g.date) + '</h2>';
      }
      html += '<div style="background:#f9fafb; border:1px solid #e5e7eb; border-radius:12px; padding:20px 24px; margin-bottom:14px;">';
      html += '<div style="font-size:20px; font-weight:800; color:#111827; margin-bottom:4px;">' + g.stock + '</div>';
      html += '<div style="font-size:13px; color:#6b7280; margin-bottom:14px;">세 가지 관점으로 읽기</div>';
      html += '<div style="display:flex; gap:10px; flex-wrap:wrap;">';
      ORDER.forEach(function (p) {
        if (!g.views[p]) return;
        var conf = PERSPECTIVES[p];
        html += '<a href="' + g.views[p] + '" style="flex:1; min-width:140px; text-decoration:none; text-align:center; padding:12px 16px; border-radius:10px; background:#ffffff; border:1.5px solid ' + conf.color + ';">';
        html += '<div style="font-size:15px; font-weight:800; color:' + conf.color + ';">' + p + ' 관점</div>';
        html += '<div style="font-size:12px; color:#6b7280; margin-top:3px;">' + conf.desc + '</div>';
        html += '</a>';
      });
      html += '</div></div>';
    });
    container.innerHTML = html;
  }

  function fail() {
    document.getElementById('post-list').innerHTML =
      '<p style="font-size:14px; color:#6b7280; text-align:center; padding:40px 0;">목록을 불러오지 못했습니다. 잠시 후 새로고침해 주시거나, <a href="https://github.com/seil77/stock-prism/tree/main/posts" style="color:#2563eb;">GitHub에서 직접 보기</a>를 이용해 주세요.</p>';
  }

  fetch(API_URL)
    .then(function (res) { if (!res.ok) throw new Error(res.status); return res.json(); })
    .then(function (data) { if (!Array.isArray(data)) throw new Error('bad'); render(data); })
    .catch(fail);
})();
</script>

</body>
</html>
